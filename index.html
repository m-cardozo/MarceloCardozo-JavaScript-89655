<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Proyecto Final - JavaScript - Comisión 89655</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      integrity="sha512-c42qTSw/wPZ3/5LBzD+Bw5f7bSF2oxou6wEb+I/lqeaKV5FDIfMvvRp772y4jcJLKuGUOpbJMdg/BTl50fJYAw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <h1>Simulador de Transporte de Carga</h1>

    <form id="formSimuladorTransporte">
      <div class="fld">
        <label for="origen">Origen</label>
        <input type="text" id="origen" name="origen" placeholder="Ingresar origen" required />
      </div>

      <div class="fld">
        <label for="destino">Destino</label>
        <input type="text" id="destino" name="destino" placeholder="Ingresar destino" required />
      </div>

      <div class="fld">
        <label for="distancia">Distancia (Km)</label>
        <input type="number" id="distancia" name="distancia" placeholder="Ingresar kilometros" required />
      </div>

      <div class="fld">
        <label for="kilogramos">Peso de la carga (Kg)</label>
        <input type="number" id="kilogramos" name="kilogramos" placeholder="Ingresar kilogramos" required />
      </div>

      <div class="fld">
        <label for="empresa">Empresa</label>
        <input type="text" id="empresa" name="empresa" placeholder="Ingresar empresa o nombre" required />
      </div>

      <div class="fld cliente-frecuente">
        <label for="clienteFrecuente">Cliente frecuente</label>
        <input type="checkbox" id="clienteFrecuente" name="clienteFrecuente" />
      </div>

      <button onclick="mostrarResultado()">Simular</button>
    </form>

    <button id="btnVerHistorial">Ver historial</button>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/main.js"></script>
  </body>
</html>
